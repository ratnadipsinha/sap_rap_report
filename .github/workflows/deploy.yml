name: SAP RAP Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # ── Secrets (set in GitHub repo → Settings → Secrets) ──────────
  BTP_HOST:     ${{ secrets.BTP_HOST }}       # from project.config.yml → btp.host
  BTP_USER:     ${{ secrets.BTP_USER }}       # from project.config.yml → btp.communication.deploy_user
  BTP_PASS:     ${{ secrets.BTP_PASS }}       # password — never in config file
  ATC_USER:     ${{ secrets.ATC_USER }}       # from project.config.yml → btp.communication.atc_user
  ATC_PASS:     ${{ secrets.ATC_PASS }}
  TEST_USER:    ${{ secrets.TEST_USER }}      # from project.config.yml → btp.communication.test_user
  TEST_PASS:    ${{ secrets.TEST_PASS }}
  # ── Non-secret values (read from project.config.yml) ────────────
  PACKAGE:      "ZXX_REPORTS"                # project.config.yml → packages.reports
  ATC_VARIANT:  "ABAP_CLOUD"                 # project.config.yml → atc.check_variant
  BTP_CLIENT:   "100"                        # project.config.yml → btp.client
  SRC_FOLDER:   "/src"                       # project.config.yml → abapgit.src_folder

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — ATC Quality Gate  (SAP_COM_0748)
  # ────────────────────────────────────────────────────────────────
  atc-check:
    name: ATC Clean Core Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger ATC run via REST
        id: atc
        run: |
          echo "Starting ATC check on package $PACKAGE..."

          RESPONSE=$(curl -s -o atc_response.xml -w "%{http_code}" \
            -X POST "$BTP_HOST/sap/bc/adt/atc/runs" \
            -u "$BTP_USER:$BTP_PASS" \
            -H "Content-Type: application/vnd.sap.atc.run.parameters.v1+xml" \
            -H "Accept: application/xml" \
            -H "sap-client: 100" \
            -d "<?xml version=\"1.0\" encoding=\"utf-8\"?>
                <atc:run maximumVerdicts=\"100\"
                  xmlns:atc=\"http://www.sap.com/adt/atc\">
                  <objectSets>
                    <objectSet type=\"multiPropertySet\">
                      <multiPropertySet>
                        <adtcore:objectProperties
                          adtcore:name=\"$PACKAGE\"
                          adtcore:type=\"DEVC/K\"
                          xmlns:adtcore=\"http://www.sap.com/adt/core\"/>
                      </multiPropertySet>
                    </objectSet>
                  </objectSets>
                  <checkVariant checkVariantName=\"$ATC_VARIANT\"/>
                </atc:run>")

          echo "HTTP Status: $RESPONSE"
          cat atc_response.xml

          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "ERROR: ATC trigger failed with HTTP $RESPONSE"
            exit 1
          fi

          # Extract run ID from response and poll for completion
          RUN_ID=$(grep -oP '(?<=atc:run id=")[^"]+' atc_response.xml | head -1)
          echo "ATC Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Poll ATC results
        run: |
          echo "Polling for ATC results..."
          for i in {1..20}; do
            sleep 10
            RESULT=$(curl -s \
              "$BTP_HOST/sap/bc/adt/atc/runs/${{ steps.atc.outputs.run_id }}/results" \
              -u "$BTP_USER:$BTP_PASS" \
              -H "Accept: application/xml")

            STATUS=$(echo "$RESULT" | grep -oP '(?<=status=")[^"]+' | head -1)
            echo "Poll $i — Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "$RESULT" > atc_results.xml
              break
            fi
          done

      - name: Check for ATC findings
        run: |
          ERRORS=$(grep -c 'severity="error"' atc_results.xml || echo 0)
          WARNINGS=$(grep -c 'severity="warning"' atc_results.xml || echo 0)
          echo "ATC Errors: $ERRORS  |  Warnings: $WARNINGS"

          if [ "$ERRORS" -gt "0" ]; then
            echo "GATE FAILED: $ERRORS ATC error(s) found. Fix before deploying."
            cat atc_results.xml
            exit 1
          fi

          echo "ATC GATE PASSED — zero errors."

      - name: Upload ATC results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atc-results
          path: atc_results.xml

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — ABAP Unit Tests  (SAP_COM_0715)
  # ────────────────────────────────────────────────────────────────
  unit-tests:
    name: ABAP Unit Tests
    runs-on: ubuntu-latest
    needs: atc-check                          # only runs if ATC passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger ABAP Unit Test run
        id: unittest
        run: |
          echo "Starting ABAP Unit Tests for package $PACKAGE..."

          RESPONSE=$(curl -s -o unit_response.xml -w "%{http_code}" \
            -X POST "$BTP_HOST/sap/bc/adt/abapunit/runs" \
            -u "$BTP_USER:$BTP_PASS" \
            -H "Content-Type: application/vnd.sap.adt.abapunit.run.v1+xml" \
            -H "Accept: application/xml" \
            -d "<?xml version=\"1.0\" encoding=\"utf-8\"?>
                <aunit:run xmlns:aunit=\"http://www.sap.com/adt/aunit\">
                  <aunit:options>
                    <aunit:measurements forCoverage=\"false\"/>
                    <aunit:scope ownTests=\"true\" foreignTests=\"false\"/>
                    <aunit:riskLevel harmless=\"true\" dangerous=\"false\" critical=\"false\"/>
                    <aunit:duration short=\"true\" medium=\"false\" long=\"false\"/>
                  </aunit:options>
                  <osl:objectSet xsi:type=\"osl:MultiPropertySetObjectSet\"
                    xmlns:osl=\"http://www.sap.com/api/osl\"
                    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\">
                    <osl:multiPropertySet>
                      <osl:package name=\"$PACKAGE\"/>
                    </osl:multiPropertySet>
                  </osl:objectSet>
                </aunit:run>")

          echo "HTTP Status: $RESPONSE"
          cat unit_response.xml

          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "ERROR: Unit test trigger failed with HTTP $RESPONSE"
            exit 1
          fi

      - name: Check unit test results
        run: |
          FAILURES=$(grep -c 'result="failed"' unit_response.xml || echo 0)
          ERRORS=$(grep -c 'result="error"' unit_response.xml || echo 0)
          echo "Test Failures: $FAILURES  |  Errors: $ERRORS"

          if [ "$((FAILURES + ERRORS))" -gt "0" ]; then
            echo "UNIT TEST GATE FAILED: $FAILURES failure(s), $ERRORS error(s)."
            exit 1
          fi

          echo "UNIT TEST GATE PASSED — all tests green."

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — AUTO DEPLOY to SAP BTP  (abapGit pull via ADT REST)
  # Only runs on push to main (not on PRs) and only if gates passed
  # ────────────────────────────────────────────────────────────────
  deploy-to-btp:
    name: Deploy to SAP BTP
    runs-on: ubuntu-latest
    needs: [ atc-check, unit-tests ]          # both gates must pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger abapGit Pull on SAP BTP
        run: |
          echo "Triggering abapGit pull on SAP BTP..."

          # Get the abapGit repo key linked to this GitHub repo
          REPOS=$(curl -s \
            "$BTP_HOST/sap/bc/adt/abapgit/repos" \
            -u "$BTP_USER:$BTP_PASS" \
            -H "Accept: application/json")

          echo "Registered abapGit repos: $REPOS"

          # Extract repo key for this GitHub repository
          REPO_KEY=$(echo "$REPOS" | python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          for r in repos.get('repositories', []):
              if '${{ github.repository }}' in r.get('remoteUrl',''):
                  print(r['key'])
                  break
          ")

          if [ -z "$REPO_KEY" ]; then
            echo "ERROR: No abapGit repo found linked to ${{ github.repository }}"
            exit 1
          fi

          echo "Found abapGit repo key: $REPO_KEY"

          # Trigger pull (import from GitHub to BTP)
          PULL_RESPONSE=$(curl -s -o pull_response.json -w "%{http_code}" \
            -X POST "$BTP_HOST/sap/bc/adt/abapgit/repos/$REPO_KEY/pulls" \
            -u "$BTP_USER:$BTP_PASS" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"branchName\": \"main\"}")

          echo "Pull HTTP Status: $PULL_RESPONSE"
          cat pull_response.json

          if [ "$PULL_RESPONSE" != "200" ] && [ "$PULL_RESPONSE" != "201" ]; then
            echo "ERROR: abapGit pull failed with HTTP $PULL_RESPONSE"
            exit 1
          fi

          echo "DEPLOY TRIGGERED — abapGit pulling from main branch into SAP BTP."

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

          STATUS=$(curl -s \
            "$BTP_HOST/sap/bc/adt/abapgit/repos" \
            -u "$BTP_USER:$BTP_PASS" \
            -H "Accept: application/json" | \
            python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          for r in repos.get('repositories', []):
              if '${{ github.repository }}' in r.get('remoteUrl',''):
                  print(r.get('status','unknown'))
                  break
          ")

          echo "Deployment status: $STATUS"

          if [ "$STATUS" = "error" ]; then
            echo "DEPLOYMENT FAILED — check SAP BTP abapGit logs."
            exit 1
          fi

          echo "DEPLOYMENT COMPLETE — Fiori app live on SAP BTP."

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOY PIPELINE COMPLETE"
          echo "  Package  : $PACKAGE"
          echo "  Branch   : main"
          echo "  BTP Host : $BTP_HOST"
          echo "  ATC      : PASSED (zero errors)"
          echo "  Tests    : PASSED (all green)"
          echo "  Deploy   : COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
