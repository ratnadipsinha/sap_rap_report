# ═══════════════════════════════════════════════════════════════
#  SAP RAP PROJECT CONFIGURATION
#  Central config for all tools: Claude, Eclipse ADT, abapGit
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# PROJECT
# ───────────────────────────────────────────────────────────────
project:
  name:        "SAP RAP One-Click Deploy Pipeline"
  namespace:   "ZXX_"                      # all custom objects start with this
  owner:       "ratnadipsinha"
  team:        "SAP Development Team"

# ───────────────────────────────────────────────────────────────
# GITHUB  (code storage + version control only)
# ───────────────────────────────────────────────────────────────
github:
  repo:        "ratnadipsinha/SAP_RAP_REPORT"
  url:         "https://github.com/ratnadipsinha/SAP_RAP_REPORT.git"
  branch:
    main:      "main"                       # stable — Eclipse pulls this to BTP
    feature:   "feature/*"                  # developer feature branches

# ───────────────────────────────────────────────────────────────
# SAP DEV SYSTEM  (Eclipse ADT connects here)
# ───────────────────────────────────────────────────────────────
dev_system:
  host:        "REPLACE_WITH_DEV_SYSTEM_HOST"
  client:      "100"
  description: "SAP BTP ABAP Environment — Eclipse ADT connects here"

# ───────────────────────────────────────────────────────────────
# ABAPGIT  (Eclipse plugin — bridges GitHub and SAP system)
# ───────────────────────────────────────────────────────────────
abapgit:
  repo_url:    "https://github.com/ratnadipsinha/SAP_RAP_REPORT.git"
  branch:      "main"
  src_folder:  "/src"                       # abapGit reads/writes ABAP objects here
  package:     "ZXX_REPORTS"
  transport:   "REPLACE_WITH_TRANSPORT_REQUEST"

# ───────────────────────────────────────────────────────────────
# ATC  (runs inside Eclipse ADT — no REST / no GitHub secrets)
# ───────────────────────────────────────────────────────────────
atc:
  tool:          "Eclipse ADT"              # NOT GitHub Actions
  check_variant: "ABAP_CLOUD"              # standard cloud readiness check
  custom_variant: "ZXX_CLEAN_CORE"         # your custom check variant (optional)
  trigger:       "automatic"               # auto-runs before every transport/push
  setup: >
    Eclipse → Window → Preferences →
    ABAP Development → ATC →
    Check variant: ABAP_CLOUD →
    Enable: Run ATC before transport release

# ───────────────────────────────────────────────────────────────
# ABAP PACKAGE STRUCTURE
# ───────────────────────────────────────────────────────────────
packages:
  root:        "ZXX"
  reports:     "ZXX_REPORTS"
  sales:       "ZXX_SALES_REPORT"
  foundation:  "ZXX_FOUNDATION"

# ───────────────────────────────────────────────────────────────
# SERVICES — OData Bindings
# ───────────────────────────────────────────────────────────────
services:
  sales_report:
    service_definition: "ZXX_UI_SalesReport_O4"
    service_binding:    "ZXX_UI_SalesReport_O4"
    binding_type:       "OData V4 - UI"
    fiori_app_id:       "REPLACE_WITH_FIORI_APP_ID"

# ───────────────────────────────────────────────────────────────
# NAMING CONVENTION
# ───────────────────────────────────────────────────────────────
naming:
  prefix:             "ZXX_"
  interface_cds:      "ZXX_I_"
  projection_cds:     "ZXX_C_"
  value_help:         "ZXX_I_VH_"
  behavior_impl:      "ZXX_BP_I_"
  service_ui:         "ZXX_UI_"
  service_api:        "ZXX_API_"
  global_class:       "ZXX_CL_"
  interface:          "ZXX_IF_"
  exception:          "ZXX_CX_"
  atc_check:          "ZXX_ATC_"

# ───────────────────────────────────────────────────────────────
# SKILLS
# ───────────────────────────────────────────────────────────────
skills:
  - name:   "SAP-NAMING-CONVENTION"
    file:   "Skills/SAP-NAMING-CONVENTION.md"
    step:   1
    invoke: "/sap-naming-convention"

  - name:   "SAP-FIORI-DESIGNER"
    file:   "Skills/SAP-FIORI-DESIGNER.md"
    step:   2
    invoke: "/sap-fiori-designer"

  - name:   "SAP-RAP-DEVELOPER"
    file:   "Skills/SAP-RAP-DEVELOPER.md"
    step:   3
    invoke: "/sap-rap-developer"

  - name:   "SAP-CLEAN-CORE"
    file:   "Skills/SAP-CLEAN-CORE.md"
    step:   4
    invoke: "/sap-clean-core"

  - name:   "SAP-BTP-TRIAL-TEMPLATE"
    file:   "Skills/SAP-BTP-TRIAL-TEMPLATE.md"
    step:   5
    invoke: "/sap-btp-trial-template"
    note:   "Load before generating code for BTP trial — avoids all known abapGit pull errors"

# ───────────────────────────────────────────────────────────────
# FOLDER STRUCTURE
# ───────────────────────────────────────────────────────────────
folders:
  src:          "src/"
  skills:       "Skills/"
  docs:         "docs/"
  diagrams:     "diagrams/"
  requirements: "requirements/"
